name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend-lint-test:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore back/B.csproj

      - name: Build
        run: dotnet build back/B.csproj --no-restore -c Release

      - name: Restore tests
        run: dotnet restore back.Tests/back.Tests.csproj

      - name: Test
        env:
          JWT_SECRET: ci_test_secret_at_least_32_characters_long
        run: dotnet test back.Tests/back.Tests.csproj --no-restore --verbosity normal

  frontend-lint-build:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: front/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5080
